name: Test

# Disable permissions for all available scopes by default.
permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  # Runs the PHPUnit tests inside the wp-env Docker environment.
  #
  # The Abilities API ships in WordPress 7.0 core, so no extra plugin is needed:
  # wp-env's default ("latest") core provides wp_register_ability() and friends.
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.3']
    env:
      WP_ENV_PHP_VERSION: ${{ matrix.php }}

    steps:
      - name: Configure environment variables
        run: |
          echo "PHP_FPM_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "PHP_FPM_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php }}'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install npm dependencies
        run: npm ci

      - name: Start the wp-env test environment
        run: npm run wp-env:test start

      - name: Log versions
        run: |
          npm run wp-env:test -- run cli php -- -v
          npm run wp-env:test -- run cli wp core version

      - name: Run PHPUnit
        run: npm run test:php
