name: Release

# Disable permissions for all available scopes by default.
permissions: {}

on:
  release:
    types:
      - published

jobs:
  # Builds the distributable plugin zip and attaches it to the GitHub Release.
  #
  # The zip is built with `wp-scripts plugin-zip`. Because package.json has a
  # `files` field, plugin-zip selects what ships via npm-packlist from that field
  # (a `.distignore` is NOT consulted while the field exists). The preceding
  # `composer install --no-dev` is what keeps the dev toolchain (phpstan.phar,
  # phpcs, phpunit) out of vendor/; without it the zip fails Plugin Check. The
  # result is a single top-level `abilities-catalog/` directory so the file
  # installs cleanly via Plugins -> Add New -> Upload Plugin.
  build-zip:
    name: Build and attach plugin zip
    runs-on: ubuntu-24.04
    permissions:
      # Required to upload the asset to the release.
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify plugin version matches release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          header="$(sed -n 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*//p' abilities-catalog.php | head -n1 | tr -d '[:space:]')"
          constant="$(sed -n "s/.*ABILITIES_CATALOG_VERSION'[, ]*'\([^']*\)'.*/\1/p" abilities-catalog.php | head -n1)"
          echo "tag=$tag header=$header constant=$constant"
          if [ "$tag" != "$header" ] || [ "$tag" != "$constant" ]; then
            echo "::error::Release tag ($tag) does not match plugin header ($header) and/or ABILITIES_CATALOG_VERSION ($constant). Bump the version before releasing."
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      # Production-only install: pulls the MCP adapter and the Jetpack Autoloader
      # and generates vendor/autoload_packages.php, which the MCP server requires.
      # vendor/ ships in the zip (it is in the `files` field of package.json that
      # `wp-scripts plugin-zip` reads), so the MCP server works out of the box.
      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-interaction --no-progress

      - name: Build plugin zip
        run: npm run plugin-zip

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" abilities-catalog.zip --clobber
